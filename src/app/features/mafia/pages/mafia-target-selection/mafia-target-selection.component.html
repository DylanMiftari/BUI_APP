@if (!targets || !mafia) {
  <app-page-title title="Targets Loading..."></app-page-title>
} @else {
  <app-mafia-target-selection-template
    [targets]="targets"
    [mafia]="mafia"
    [targetSelectionError]="targetSelectionError"
    (selectTarget)="onSelectTarget($event)"
  ></app-mafia-target-selection-template>
}
