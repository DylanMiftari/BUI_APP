@if(casinoDashboardData) {
  <app-config-casino-template
    [casinoDashboardData]="casinoDashboardData"

    [configurationUpdate]="casinoConfigUpdate"
    [configurationError]="casinoConfigError"
    (onSaveConfiguration)="saveConfiguration($event)"
    [rouletteConfigUpdate]="rouletteConfigUpdate"
    [rouletteConfigError]="rouletteConfigError"
    (onSaveRouletteConfiguration)="saveRoulette($event)"
  ></app-config-casino-template>
}
