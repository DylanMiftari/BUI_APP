@if(casinoTicket && roulette2Data) {
  <app-roulette2-game-template
    [casinoTicket]="casinoTicket"
    [roulette2Data]="roulette2Data"
    [rolledNumber]="roulette2Result?.roll ?? 0"
    (onClickOnSpin)="spinTheWheel($event)"
    [winText]="winText"
    [errorText]="errorText"
  >
  </app-roulette2-game-template>
}
