<p
[ngClass]="{'light': isLight}"
[style.color]="color ? colorService.simpleColor(color) : '#444444'"
[style.font-weight]="bold ? 'bold' : 'normal'"
[style.text-align]="textAlign"
[style.font-size]="fontSizePx+'px'"
[style.padding-left]="paddingXPx+'px'"
[style.padding-right]="paddingXPx+'px'"
[style.margin-top]="marginYPx+'px'"
[style.margin-bottom]="marginYPx+'px'"
[style.opacity]="opacity"
>{{ text }}</p>
