<button [style.backgroundImage]="'var('+themeColorService.cssVarFromColor(color)+')'" [class]="{'outline' : isOutlined}"
(click)="clickOnButton()" [type]="type"
[style.padding]="paddingYPx+'px '+paddingXPx+'px'" [style.font-size]="fontSizePx+'px'"
        [style.margin]="marginYPx+'px '+marginXPx+'px'"
>
    {{ label }}
</button>
