
<div class="app-wrapper" [style.background]="'var('+background+')'">
    <header>
        <img src="favicon.ico" width="70px" alt="BUI logo">

        @if(text$ | async; as text) {
            @if (link$ | async; as link) {
                <button [routerLink]="[link]" class="glass-container">{{ text }}</button>
            }
        }

        <div *ngIf="user$ | async as user">
            <h3>{{ user.pseudo }}</h3>
            <h3 class="glass-container">💰 {{ user.userMoney.toLocaleString() }}€</h3>
        </div>
    </header>

    <router-outlet />
</div>
